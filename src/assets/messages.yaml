# General Errors
error_user_required: "Error: User access required."
error_unknown_tool: "Error: Unknown tool in draft."
error_no_draft: "No draft to execute."
error_undo_nothing: "Nothing to undo."
error_undo_failed: "Could not perform undo for this action."
error_unclear_input: |
  Sorry, we couldn't understand your request.
  
  Available commands:
  - *Add Job*: 'Add: John, 123 Main St, 086 456 123, $50'
  - *Add Lead*: 'Add lead: John, 123 Main St, 086 456 123'
  - *Schedule*: 'Schedule John tomorrow at 2pm' or "Schedule John 0871235678 tommorrow at 14:00"
  - *Search*: 'Find John' or 'Show all jobs' or 'Find lead of High Street 34'
  - *Requests*: Somebody asked to call later? Store it as a request for later review. 'Add request: John on High Street 34, call 0871235678 tomorrow at 12:00'
  - *Promote*: Want to convert request to job? 'Promote request for High Street 34 to job'
  - *Edit*: 'Edit Job, Lead or Request: John on High Street 34, call 0871235678 tomorrow at 12:00'
  - *Settings*: 'Update settings'

  Note: Ideally, identify all customers by phone number or street address to avoid ambiguity or duplicates.

  Type 'help' for more details.
error_edit_nothing: "Nothing to edit."
edit_last_prompt: "Edit the last {category} ({details}). Type the details as you would before."

# Confirmation Flow
client_details: |
  - Client details:
      - Name: {name}
      - Phone: {phone}
      - Address: {address}

job_summary: |
  {category} summary:
  {client_details}
  - Status: {status}
  - Value: {price}
  - Description: {description}
schedule_summary: |
  Schedule Job:
  {client_details}
  - Time: {time}
confirm_prompt: "Please confirm: {summary}\n(Reply 'Yes' to confirm, 'No' to cancel)"
action_cancelled: "Action cancelled."
undo_hint: "(Reply 'undo' to revert)"

# Tool Execution Success
job_added: "✔ {category} added: {name} – {location}{price_info} (Reply 'undo' or 'edit last')"
job_scheduled: "✔ Scheduled {name} for {time}"
request_stored: "✔ Request stored: {content}..."
setting_updated: "✔ Updated setting '{key}' to '{value}'"
search_no_results: "No results found for '{query}'"

# Undo Success
undo_deleted: "Undone: Deleted {entity_type}."
undo_job_reverted: "Undone: Job status reverted."
undo_request_reverted: "Undone: Request status reverted."
undo_promotion_reverted: "Undone: Reverted Job promotion back to Request."
undo_setting_reverted: "Undone: Restored setting '{key}' to its previous value."
help_summary: "Help: Commands & usage"
convert_success: "✔ Converted Request to Job: {description}"
convert_failed: "Could not find request matching '{query}'"
job_multiple_found: "Multiple customers found matching '{query}'. Please be more specific (e.g., use full name or phone)."
undo_deleted_job: "Undone: Deleted job for {customer_name}"

