error_unclear_input: |
  Sorry, we couldn't understand your request.
  
  Available commands:
  - *Add Job*: 'Add: John, 123 Main St, 086 456 123, $50'
  - *Add Lead*: 'Add lead: John, 123 Main St, 086 456 123'
  - *Schedule*: 'Schedule John tomorrow at 2pm' or "Schedule John 0871235678 tommorrow at 14:00"
  - *Search*: 'Find John' or 'Show all jobs' or 'Find lead of High Street 34'
  - *Requests*: Somebody asked to call later? Store it as a request for later review. 'Add request: John on High Street 34, call 0871235678 tomorrow at 12:00'
  - *Promote*: Want to convert request to job? 'Promote request for High Street 34 to job'
  - *Pipeline*: 'Show pipeline', 'Show Lost customers' or 'Mark John as Not Interested'
  - *Invoice*: 'Send invoice to John'
  - *Status*: 'On my way to John'
  - *Teams*: 'Show schedule' or 'Where are my employees?'
  - *Assign*: 'Assign job 123 to John'
  - *Expenses*: 'Add expense 50 for fuel'
  - *Payroll*: 'Check balance' or 'Record payout 500'
  - *Reporting*: 'Export expenses to csv'
  - *Edit*: 'Edit Job, Lead or Request: John on High Street 34, call 0871235678 tomorrow at 12:00'
  - *Settings*: 'Update settings'

   Note: Identify customers by phone or address to avoid duplicates. On SMS/Email, actions auto-confirm after 45s unless cancelled.

  Type 'help' for more details.
