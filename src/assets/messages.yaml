# Help Message
help_message: |
  Here are some *key* ways I can assist you:

  - *Add Jobs*: e.g. "Fix sink for John $50"
  - *Add Leads*: e.g. "Register client: Sarah in Dublin"
  - *Schedule*: e.g. "Schedule John for tomorrow 2pm"

  **Advanced commands:**
  
  - *Search*: 'Find John' or 'Show all jobs' or 'Find lead of High Street 34'
  - *Requests*: Store a request for later review: 'Add request: John on High Street 34, call 0871235678 tomorrow at 12:00'
  - *Promote to Job*: Convert a request into a job: 'Promote request for High Street 34 to job'
  - *Sales Pipeline*: View sales funnel or update customer status: 'Show sales pipeline', 'Show Lost customers', 'Mark John as Not Interested'
  - *Invoice*: Generate and send an invoice: 'Send invoice to John'
  - *Send Status*: Notify customer you are on the way: 'On my way to John'. The client receives "Hello, I'm on my way to you. Will be there soon." (configurable)
  - *Edit*: Modify an entry: 'Edit Job, Lead or Request: John on High Street 34...'
  - *Settings*: Configure preferences: 'Update settings'
  
  Note: Identify customers by phone or address to avoid duplicates.
# redacted: On SMS/Email, actions auto-confirm after 45s unless cancelled.


# Onboarding
welcome_message: |
  Welcome to HereCRM! 🚀
  
  I'm your AI assistant to help you manage your business via WhatsApp.
  
  You can:
  - *Add Jobs*: 'Fix sink for John $50'
  - *Add Leads*: 'Add lead Mary'
  - *Schedule*: 'Schedule John for tomorrow 2pm'
  - *Search*: 'Show my jobs for today'
  - *Pipeline*: 'Show pipeline'
  - *Invoice*: 'Send invoice to John'
  - *Send Status to customer*: 'On my way to John'
  
  Try saying "Add job Fix faucet for Bob at 42 Wallaby Way $80" to get started!

welcome_back: |
  Welcome back! 👋
  
  What can I help you with today? 
  (Type 'help' to see available commands)

