# Help Message
help_message: |
  Available commands:
  - *Add Job*: 'Add: John, 123 Main St, $50'
  - *Schedule*: 'Schedule John tomorrow at 2pm'
  - *Search*: 'Find John' or 'Show all jobs'
  - *Settings*: 'Update settings'
  - *Requests*: Any other text will be stored as a request for later review.

  You can always reply 'undo' to revert your last action.
