events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Streamlit Web Socket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forward-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://frontend:8501;
        }

        # PWA Assets - Alias them so they appear at the root
        # This is the "secret sauce" for easy PWA configuration
        location /sw.js {
            proxy_pass http://frontend:8501/app/static/sw.js;
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache";
        }

        location /manifest.json {
            proxy_pass http://frontend:8501/app/static/manifest.json;
            add_header Cache-Control "no-cache";
        }

        location /icon-192.png {
            proxy_pass http://frontend:8501/app/static/icon-192.png;
        }

        location /icon-512.png {
            proxy_pass http://frontend:8501/app/static/icon-512.png;
        }
    }
}
