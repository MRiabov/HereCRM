openapi: 3.1.0
info:
  title: HereCRM PWA API
  version: 1.0.0
paths:
  /api/v1/pwa/dashboard/stats:
    get:
      tags:
      - PWA - Dashboard
      summary: Get Dashboard Stats
      operationId: get_dashboard_stats_api_v1_pwa_dashboard_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
  /api/v1/pwa/dashboard/recent-activity:
    get:
      tags:
      - PWA - Dashboard
      summary: Get Recent Activity
      operationId: get_recent_activity_api_v1_pwa_dashboard_recent_activity_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RecentActivity'
                type: array
                title: Response Get Recent Activity Api V1 Pwa Dashboard Recent Activity
                  Get
  /api/v1/pwa/onboarding/choice:
    post:
      tags:
      - PWA - Onboarding
      summary: Process Onboarding Choice
      description: Handle the user's choice to either keep their auto-created business
        or join an existing one via invite code.
      operationId: process_onboarding_choice_api_v1_pwa_onboarding_choice_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingChoice'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pwa/jobs/:
    get:
      tags:
      - PWA - Jobs
      summary: List Jobs
      description: List jobs with optional filtering by date range and employee.
      operationId: list_jobs_api_v1_pwa_jobs__get
      parameters:
      - name: date_from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Date From
      - name: customer_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Customer Id
      - name: employee_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Employee Id
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: date_to
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Date To
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListResponse'
                $ref: '#/components/schemas/JobListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - PWA - Jobs
      summary: Create Job
      description: Create a new job.
      operationId: create_job_api_v1_pwa_jobs__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pwa/jobs/{job_id}:
    get:
      tags:
      - PWA - Jobs
      summary: Get Job
      description: Get job details by ID.
      operationId: get_job_api_v1_pwa_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: integer
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - PWA - Jobs
      summary: Update Job
      description: Update job details.
      operationId: update_job_api_v1_pwa_jobs__job_id__patch
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: integer
          title: Job Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pwa/customers/:
    get:
      tags:
      - PWA - Customers
      summary: List Customers
      description: List customers with optional search.
      operationId: list_customers_api_v1_pwa_customers__get
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: pipeline_stage
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pipeline Stage
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Search
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerSchema'
                title: Response List Customers Api V1 Pwa Customers  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - PWA - Customers
      summary: Create Customer
      description: Create a new customer.
      operationId: create_customer_api_v1_pwa_customers__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pwa/customers/{customer_id}:
    get:
      tags:
      - PWA - Customers
      summary: Get Customer
      description: Get customer details by ID.
      operationId: get_customer_api_v1_pwa_customers__customer_id__get
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: integer
          title: Customer Id
      responses:
