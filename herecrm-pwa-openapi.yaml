components:
  schemas:
    ActivityType:
      type: string
      enum:
      - invoice
      - job
      - lead
      title: ActivityType
    AddressSearchResult:
      properties:
        id:
          type: integer
          title: Id
        address:
          type: string
          maxLength: 255
          title: Address
        customer:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          title: Customer
        type:
          $ref: '#/components/schemas/AddressSearchType'
      type: object
      required:
      - id
      - address
      - type
      title: AddressSearchResult
    AddressSearchType:
      type: string
      enum:
      - customer
      - job
      title: AddressSearchType
    BusinessSettingsSchema:
      properties:
        workflow_invoicing:
          anyOf:
          - $ref: '#/components/schemas/InvoicingWorkflow'
          - type: 'null'
        workflow_quoting:
          anyOf:
          - $ref: '#/components/schemas/QuotingWorkflow'
          - type: 'null'
        workflow_payment_timing:
          anyOf:
          - $ref: '#/components/schemas/PaymentTiming'
          - type: 'null'
        workflow_tax_inclusive:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Workflow Tax Inclusive
        workflow_include_payment_terms:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Workflow Include Payment Terms
        workflow_enable_reminders:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Workflow Enable Reminders
        workflow_show_whatsapp_button:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Workflow Show Whatsapp Button
        workflow_pipeline_quoted_stage:
          type: boolean
          title: Workflow Pipeline Quoted Stage
        workflow_job_creation_default:
          anyOf:
          - $ref: '#/components/schemas/JobCreationDefault'
          - type: 'null'
          default: UNSCHEDULED
        workflow_distance_unit:
          anyOf:
          - $ref: '#/components/schemas/DistanceUnit'
          - type: 'null'
          default: mi
        workflow_auto_quote_followup:
          type: boolean
          title: Workflow Auto Quote Followup
        workflow_quote_followup_delay_hrs:
          type: integer
          title: Workflow Quote Followup Delay Hrs
        workflow_auto_review_requests:
          type: boolean
          title: Workflow Auto Review Requests
        workflow_review_request_delay_hrs:
          type: integer
          title: Workflow Review Request Delay Hrs
        workflow_review_link:
          anyOf:
          - type: string
            minLength: 1
            format: uri
          - type: 'null'
          title: Workflow Review Link
        payment_link:
          anyOf:
          - type: string
            minLength: 1
            format: uri
          - type: 'null'
          title: Payment Link
        default_city:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Default City
        default_country:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Default Country
        default_tax_rate:
          anyOf:
          - type: number
          - type: 'null'
          title: Default Tax Rate
          default: 0.0
        quickbooks_connected:
          type: boolean
          title: Quickbooks Connected
        quickbooks_last_sync:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Quickbooks Last Sync
        stripe_connected:
          type: boolean
          title: Stripe Connected
        seat_count:
          type: integer
          title: Seat Count
        invite_code:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Invite Code
        billing_cycle_anchor:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Billing Cycle Anchor
        marketing_settings:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Marketing Settings
      type: object
      required:
      - workflow_invoicing
      - workflow_quoting
      - workflow_payment_timing
      - workflow_tax_inclusive
      - workflow_include_payment_terms
      - workflow_enable_reminders
      - workflow_show_whatsapp_button
      - workflow_pipeline_quoted_stage
      - workflow_auto_quote_followup
      - workflow_quote_followup_delay_hrs
      - workflow_auto_review_requests
      - workflow_review_request_delay_hrs
      - quickbooks_connected
      - stripe_connected
      - seat_count
      title: BusinessSettingsSchema
    BusinessSettingsUpdate:
