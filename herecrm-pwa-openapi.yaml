  /api/v1/pwa/jobs/:
    get:
      tags:
      - pwa-jobs
      summary: List Jobs
      description: 'List jobs.

        If search is provided, returns jobs matching the query.

        If customer_id is provided, returns job history for that customer grouped
        by date.

        If unscheduled is true, returns jobs without schedule or assignment.

        Otherwise, returns daily schedule for employees (defaults to today).'
      operationId: list_jobs_api_v1_pwa_jobs__get
      parameters:
      - name: date_from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Date From
      - name: customer_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Customer Id
      - name: employee_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Employee Id
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: unscheduled
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Unscheduled
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListResponse'
                title: Response List Jobs Api V1 Pwa Jobs  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - pwa-jobs
      summary: Create Job
      operationId: create_job_api_v1_pwa_jobs__post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
