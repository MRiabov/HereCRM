[project]
name = "herecrm"
version = "0.1.0"
description = "A CRM right in Whatsapp!"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "requests",
    "httpx",
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
    "sqlalchemy",
    "aiosqlite"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
