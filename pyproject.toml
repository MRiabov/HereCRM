[project]
name = "herecrm"
requires-python = ">=3.12"
version = "0.1.0"
description = "A CRM right in Whatsapp!"
dependencies = [
    "fastapi[standard]",
    "uvicorn[standard]",
    "requests",
    "httpx",
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
    "sqlalchemy",
    "aiosqlite",
    "openai",
    "pytest",
    "pytest-asyncio",
    "PyYAML",
    "pandas>=2.3.3",
    "openpyxl>=3.1.5",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
