version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - crm_data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/crm.db
      - PORT=8000
      # Create .env file for secrets or pass them via shell
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      # In Docker Compose, service name is the hostname
      - API_BASE_URL=http://backend:8000
      - PORT=8501
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  crm_data:
