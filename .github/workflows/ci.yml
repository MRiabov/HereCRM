name: CI

on:
#  schedule:
#    - cron: "0 * * * *"
#  pull_request:
#    branches: [ "main" ]
#    paths-ignore:
#      - "kitty-specs/**"
#      - "**.md"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        # Running with -v for verbose output
        env:
          OPENROUTER_API_KEY: "dummy_key"
          WHATSAPP_APP_SECRET: "dummy_secret"
        run: uv run pytest -v
