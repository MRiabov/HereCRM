name: Pytest

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WHATSAPP_APP_SECRET: "dummy_secret"
      OPENROUTER_API_KEY: "dummy_key"
      GOOGLE_API_KEY: "dummy_key"
      WA_TOKEN: "dummy_token"
      WA_PHONE_ID: "dummy_phone_id"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest
