openapi: 3.0.0
info:
  title: Google Calendar Auth
  version: 1.0.0
paths:
  /auth/google/login:
    get:
      summary: Initiate Google OAuth2 flow
      operationId: login_google
      responses:
        '302':
          description: Redirect to Google Accounts
  /auth/google/callback:
    get:
      summary: Handle Google OAuth2 callback
      operationId: callback_google
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful HTML page
        '400':
          description: Authentication error
