components:
  schemas:
    LocateEmployeeTool:
      type: object
      properties:
        employee_name:
          type: string
          description: "Name or partial name of the employee to locate."
      required:
        - employee_name
    
    CheckETATool:
      type: object
      properties:
        customer_phone:
          type: string
          description: "Phone number of the customer inquiring about ETA (optional if implied by context)."
        customer_name:
          type: string
          description: "Name of the customer (optional)."
      required: []
      description: "Checks the ETA of the technician assigned to the customer's active job."
